# yaml-language-server: $schema=https://raw.githubusercontent.com/cowdogmoo/warpgate/main/schema/warpgate-template.json
metadata:
  name: ares-golden-image
  version: 1.0.0
  description: Golden AMI with all Ares red team tools - recon, credential access, privesc, cracking, lateral movement, ACL abuse, and coercion
  author: Dreadnode <info@dreadnode.io>
  license: MIT
  tags:
    - ares
    - golden-image
    - red-team
    - ami
    - reconnaissance
    - credential-access
    - privilege-escalation
    - password-cracking
    - lateral-movement
    - acl
    - coercion
  requires:
    warpgate: '>=1.0.0'

name: ares-golden-image
version: latest

base:
  image: kalilinux/kali-rolling@sha256:dddc31e0f4bc57b4b91e9027762544506bf91c7cdd7ff52104daaa4449b4c726:latest
  ami_filters:
    owners:
      - "679593333241"
    filters:
      name: "debian-kali-last-snapshot-amd64-*"
      architecture: "x86_64"
    most_recent: true

sources:
  # Clone the ares repo and use its ansible/ subtree as the nimbus_range
  # collection. This keeps the AMI tracking the same branch as the rest of
  # the project — role edits ship together, no second repo to publish to.
  # Mirrors the pattern in ares-golden-azure/warpgate.yaml.
  - name: ares
    git:
      repository: https://github.com/dreadnode/ares.git
      ref: feat/more-attack-cov
      depth: 1
      auth:
        token: ${GITHUB_TOKEN}

provisioners:
  # Install pipx and Ansible
  - type: shell
    inline:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates git procps sudo python3-apt python3-pip python3-venv pipx
      - 'sed -i ''s|^PATH="|PATH="/root/.local/bin:/root/.cargo/bin:|'' /etc/environment || echo ''PATH="/root/.local/bin:/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"'' > /etc/environment'
      - pipx install --force uv
      - pipx install --force ansible-core
      - pipx ensurepath

  # Copy the ansible/ subtree of the ares repo into the nimbus_range
  # collection path on the build instance.
  - type: file
    source: ${sources.ares}
    destination: /tmp/ares

  - type: shell
    inline:
      - mkdir -p /root/.ansible/collections/ansible_collections/dreadnode/nimbus_range
      - cp -r /tmp/ares/ansible/. /root/.ansible/collections/ansible_collections/dreadnode/nimbus_range/
      - rm -rf /tmp/ares

  # Attack Box - all red team tools + Alloy telemetry. The cracking_tools
  # role handles the full NVIDIA stack (driver, DKMS, CUDA toolkit, OpenCL
  # ICD) — driving it through ansible keeps Recommends enabled (so dkms +
  # libcuda1 come along), uses linux-headers-amd64 (the meta-package, kept
  # in sync with the running kernel) instead of pinning to the AMI builder's
  # kernel, and verifies nvidia-smi/clinfo at build time.
  # NOTE: Using shell instead of ansible provisioner because the playbook
  # exceeds EC2 Image Builder's 16000 character component limit.
  - type: shell
    inline:
      - PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin ansible-galaxy collection install -r /root/.ansible/collections/ansible_collections/dreadnode/nimbus_range/requirements.yml --force
      - HOME=/root ANSIBLE_REMOTE_TMP=/tmp/ansible-tmp-$USER PATH=/root/.local/bin:/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin ansible-playbook /root/.ansible/collections/ansible_collections/dreadnode/nimbus_range/playbooks/ares/goad_attack_box.yml -i localhost, -c local -e ansible_shell_executable=/bin/bash -e ansible_python_interpreter=/usr/bin/python3 -e cracking_tools_gpu_support=true -e cracking_tools_hashcat_from_source=true -e cracking_tools_nvidia_opencl_icd=true -e cracking_tools_install_nvidia_driver=true -e cracking_tools_install_cuda_toolkit=true

  # Cleanup
  - type: shell
    inline:
      - apt-get clean
      - rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
      - echo "Ares golden image build completed successfully"

targets:
  - type: ami
    region: us-west-1
    instance_type: g4dn.xlarge
    ami_name: "ares-golden-image-{{timestamp}}"
    volume_size: 100
    ami_tags:
      Name: ares-golden-image
      Project: ares
      Role: RedTeamAttackBox
      ManagedBy: warpgate
      Tools: recon,credential-access,privesc,cracker,lateral-movement,acl-abuse,coercion
